<!DOCTYPE html>
<html lang="en">
<head>
  <title>Dark Mode - Susam Pal</title>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="theme-color" content="#333">
  <link rel="canonical" href="https://susam.in/dark/">
  <link rel="icon" type="image/png" href="../favicon.png">
  <link rel="stylesheet" href="../css/main.css">
</head>
<body>
<script>
if (localStorage.getItem('dark')) { document.body.className = 'dark' }
</script>
<main>

<h1><a href="./">Dark Mode</a></h1>

<p>
This website can be viewed in dark mode. This feature requires
JavaScript to be enabled.
</p>

<noscript>
<div>
<p>
JavaScript appears to be disabled on your web browser.
</p>
<p>
Please enable JavaScript to use dark mode.
</p>
</div>
</noscript>

<p>
<button id="darkButton" style="height: 2em; font-size: 1em">
Toggle Dark Mode
</button>
</p>

<p>
<button id="backButton" style="height: 2em; font-size: 1em">
Go Back
</button>
</p>

<script>
var oldOnload = window.onload

window.onload = function() {
  if (typeof oldOnload === 'function') {
    oldOnload()
  }

  var darkButton = document.getElementById('darkButton')
  var backButton = document.getElementById('backButton')

  darkButton.onclick = function () {
    darkEnabled = localStorage.getItem('dark') === 'yes'

    if (darkEnabled) {
      localStorage.removeItem('dark')
      document.body.className = ''
    } else {
      localStorage.setItem('dark', 'yes')
      document.body.className = 'dark'
    }
  }

  backButton.onclick = function () {
    window.history.back()
  }
}
</script>
</main>
